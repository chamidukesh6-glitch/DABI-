<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chamidu Downloader</title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: white;
  overflow: hidden;
}

video.bg-video {
  position: fixed;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -1;
}

.container {
  position: relative;
  z-index: 1;
  text-align: center;
  padding-top: 50px;
}

h1 {
  font-size: 32px;
}

input {
  width: 70%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  margin-bottom: 20px;
}

.button {
  display: block;
  width: 70%;
  margin: 10px auto;
  padding: 12px;
  border-radius: 10px;
  background: linear-gradient(45deg, black, blue);
  color: white;
  border: none;
  cursor: pointer;
  box-shadow: 0 0 10px blue;
  transition: 0.3s;
}

.button:hover {
  box-shadow: 0 0 20px cyan;
}

.sound-btn {
  position: fixed;
  top: 10px;
  right: 10px;
  padding: 10px;
  background: black;
  color: white;
  border-radius: 8px;
  cursor: pointer;
}
</style>
</head>
<body>

<video id="bgVideo" class="bg-video" autoplay muted></video>

<div class="sound-btn" onclick="toggleSound()">🔊 Sound</div>

<div class="container">
  <h1>Chamidu Downloader</h1>
  <input type="text" id="url" placeholder="Paste your link here">

  <button class="button" onclick="download('facebook')">Facebook Download</button>
  <button class="button" onclick="download('instagram')">Instagram Download</button>
  <button class="button" onclick="download('instagram2')">Instagram Alt Download</button>
  <button class="button" onclick="download('tiktok')">TikTok Download</button>
